<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="images/yeni-logo.png">
<meta property="og:image" content="https://netmaxgayrimenkul-ctrl.github.io/4468-5/images/yeni-logo.png">
<title>Parsel Ucuş + Sunum</title>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ===================================================== */
/* 🌍 GENEL YAPILANDIRMA                                 */
/* ===================================================== */
body {
  margin: 0;
  padding: 0;
}

* {
  box-sizing: border-box; /* Padding ve border'ların genişliğe dahil olmasını sağlar */
}

#map {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
  z-index: 1; /* Harita en altta */
  background: #fff;
}

/* UI Katmanı: Harita üzerindeki buton ve panellerin taşıyıcısı */
#ui-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* Haritayı tıklamayı engellemez */
  z-index: 10;
}

/* ===================================================== */
/* 🔍 ZOOM SEVİYESİ GÖSTERGESİ                           */
/* ===================================================== */
#zoom-level {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 3px 6px;
  border-radius: 4px;
  font-family: Consolas, Monaco, monospace;
  font-size: 10px;
  z-index: 9999;
  max-width: 90vw;
  opacity: 1;
  transition: opacity 0.6s ease;
}

#zoom-level.hide {
  opacity: 0; /* Uçuş başladığında gizlenmesi için */
}

/* ===================================================== */
/* ✈ UÇUŞ PANELİ (SAĞ ÜST)                               */
/* ===================================================== */
#flightPanel {
  position: absolute;
  top: 30px;
  right: 15px;
  max-width: 85vw;
  background: linear-gradient(135deg, rgba(20,20,28,0.92), rgba(10,10,15,0.88));
  color: #e6e6e6;
  padding: 8px 10px;
  border-radius: 8px;
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 11px;
  line-height: 1.4;
  backdrop-filter: blur(10px); /* Cam efekti */
  box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
  opacity: 0; /* Başlangıçta gizli */
  transform: translateY(-40px) scale(0.98);
  transition: opacity 2s ease, transform 2s cubic-bezier(0.16,1,0.3,1);
}

#flightPanel.active {
  opacity: 1; /* Belirlenen saniyede görünür olur */
  transform: translateY(0) scale(1);
  transition: opacity 1s ease, transform 1s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 0 15px #7CFC00, 0 8px 20px rgba(0,0,0,0.5); /* Yeşil parlama */
}

#flightPanel div { margin-bottom: 6px; }
#flightPanel div:last-child { margin-bottom: 0; }

/* Panel Veri Renkleri */
#distanceInfo { color: #4fd1c5; font-weight: 600; }
#speedInfo    { color: #f6ad55; }
#timeInfo     { color: #a0aec0; }



/* ===================================================== */
/* 🔊 SES BUTONU                                         */
/* ===================================================== */
/* Mevcut butonun */
#soundBtn {
  position: fixed;
  right: 16px;
  bottom: 50px;
  width: 35px;
  height: 35px;
  /* Flex özellikleri ikonu tam merkeze çiviler */
  display: flex;
  align-items: center;
  justify-content: center;
  /* İkonun kutu içinde sağa sola kaymasını önlemek için: */
  padding: 0;
  margin: 0;
  
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
  color: white;
  border-radius: 50%;
  cursor: pointer;
  z-index: 99999;
  transition: 0.2s ease;
  /* Fontun kutuya tam sığması için font-size ile oynayacağız */
  font-size: 18px; 
  line-height: 1;
}

#soundBtn:hover {
  transform: scale(1.08);
  background: rgba(0,0,0,0.6);
}

/* İşaret parmağı ikonun */
#clickIcon {
  position: fixed; /* Butonla aynı yere sabitlemek için */
  right: 25px;      /* Butonun merkezine hizalamak için ayarlandı */
  bottom: 95px;     /* Butonun tam 45px üstünde başlar */
  font-size: 30px;
  pointer-events: none;
  z-index: 99998;
  transition: opacity 0.5s ease;
  animation: pulse 1.5s infinite;
}

/* Senin animasyonunla uyumlu dikey hareket */
@keyframes pulse {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}
/* ===================================================== */
/* 🛑 MARKER RIPPLE (PİST DALGALANMA)                   */
/* ===================================================== */
.marker-pulse {
    position: absolute;
    width: 32px;
    height: 32px;
    background-color: rgba(231, 76, 60, 0.8);
    border: 2px solid rgba(231, 76, 60, 1);
    border-radius: 50%;
    z-index: 1;
    animation: marker-ripple 1.5s infinite ease-out;
}

@keyframes marker-ripple {
    0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
    70% { box-shadow: 0 0 20px 10px rgba(231, 76, 60, 0); }
    100% { transform: scale(4); opacity: 0; }
}

.marker-icon {
    box-shadow: 0 0 15px rgba(231, 76, 60, 0.8) !important;
}



/* ===================================================== */
/* 🛑 BİNA MARKER                                      */
/* ===================================================== */
.bina-marker {
    transition: transform 0.2s;
}
.bina-marker:hover {
    transform: scale(1.2); /* Fare üzerine gelince büyümesi için */
}


/* ===================================================== */
/*      VİDEO                                            */
/* ===================================================== */
#finalVideo {
    display: none;
    opacity: 0;
    transition: opacity 2000ms ease-in-out; /* 2 saniyelik yumuşak geçiş */
}



/* ===================================================== */
/* 📜 SLOGAN KUTUSU (SOL ÜST)                            */
/* ===================================================== */
#slogan-box {
  position: absolute;
  left: 22%;
  top: 120px; /* Üst panelle mesafe kısaltıldı (110'dan 75'e) */
  width: 210px; /* Genişlik daraltıldı (210'dan 185'e) */
  background: linear-gradient(135deg, rgba(15,15,20,0.95), rgba(5,5,10,0.92));
  backdrop-filter: blur(10px);
  border-left: 3px solid #ffb800; /* Çizgi bir tık inceltildi */
  border-top: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px 10px 10px 4px;
  padding: 8px; /* İç boşluklar azaltıldı */
  font-family: 'Poppins', sans-serif;
  z-index: 999999; /* En üstte görünmesi için */
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  
  /* Animasyon Başlangıç Durumu */
  opacity: 0;
  transform: translateX(-15px);
  transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Kutu Geldiğinde (Show Class) */
#slogan-box.show {
  opacity: 1;
  transform: translateX(0);
}

/* Slogan Satırları */
.slogan-wrapper {
  display: flex;
  flex-direction: column;
  gap: 6px; /* Satır araları daraltıldı */
}

.slogan-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.slogan-item span {
  color: #efefef;
  font-size: 12px; /* Font okunabilir ama küçük seçildi */
  font-weight: 500;
  line-height: 2.2;
}

/* İkon Kutuları */
.slogan-icon {
  width: 20px;
  height: 20px;
  min-width: 20px;
  background: rgba(255, 184, 0, 0.12);
  border: 1px solid rgba(255, 184, 0, 0.3);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slogan-icon i {
  font-size: 14px;
  color: #ffb800;
}

/* 🔥 GÖRSEL FİYAT ALANI (EKSTRA KOMPAKT) */
.slogan-price {
  margin-top: 5px; /* Boşluk iyice daraltıldı */
  padding-top: 4px;
  border-top: 1px solid rgba(255, 184, 0, 0.2); /* Kesikli yerine düz ince çizgi yer kazandırır */
  display: flex;
  flex-direction: row; /* DİKEY YERİNE YATAY YAPTIK: Etiket ve Fiyat yan yana, yer kazandırır */
  justify-content: space-between; 
  align-items: center;
}

.price-label {
  font-size: 7.5px; /* Mikro boyut */
  text-transform: uppercase;
  color: #ffb800;
  font-weight: 600;
  opacity: 0.9;
  letter-spacing: 0.5px;
}

.price-value {
  font-size: 11px; /* 16'dan 14'e çekildi, hala net okunur */
  font-weight: 500;
  color: #fff;
  text-shadow: 0 0 5px rgba(255, 184, 0, 0.2);
  display: flex;
  align-items: baseline;
}

.price-currency {
  font-size: 10px; /* Para birimi küçültüldü */
  color: #ffb800;
  margin-left: 2px;
  font-weight: 600;
}

/* Koyu Altın başlayıp Dışa Doğru Beyaz Patlayan Efekt */
@keyframes gold-to-white-pulse {
  0% {
    /* Başlangıç: Marka rengiyle keskin hat */
    outline: 2px solid rgba(255, 184, 0, 0.9);
    outline-offset: 0px;
    box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
  }
  50% {
    /* Orta: Dışa doğru beyaz parlama patlaması */
    outline: 1.5px solid rgba(255, 255, 255, 0.6);
    outline-offset: 10px;
    box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.4);
  }
  100% {
    /* Bitiş: Beyaz sis şeklinde genişleyerek kaybolma */
    outline: 1px solid rgba(255, 255, 255, 0);
    outline-offset: 18px;
    box-shadow: 0 0 30px 10px rgba(255, 255, 255, 0);
  }
}

.price-halo-active {
  position: relative;
  display: inline-flex; /* Fiyatın etrafını tam sarması için */
  align-items: baseline;
  border-radius: 4px;
  padding: 0 6px;
  
  /* 2.5 saniyede bir yumuşak geçişli sonsuz döngü */
  animation: gold-to-white-pulse 2.5s ease-out infinite;
  
  /* Yazı rengini sabit tutar */
  color: #fff; 
}

/* ===================================================== */
/* 📱 ALT LOGO VE İLETİŞİM (BOTTOM LOGO)                */
/* ===================================================== */
#bottom-logo{
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 95vw;
  max-width: 420px;
  z-index: 999999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}

#bottom-logo.show{
  opacity: 1;
  pointer-events: auto;
}

#bottom-logo svg{ width:100%; height:auto; display:block; }

/* ===================================================== */
/* 🏛 ÜST BAŞLIK (TOPBAR)                                */
/* ===================================================== */
#map-topbar{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%) translateY(-10px);

  width:83vw;

  border-radius:5px;

  border-left:4px solid #ffb800;

  background:rgba(0,0,0,0.88);

  z-index:99999;

  display:flex;
  flex-direction:column;

  opacity:0;
  visibility:hidden;

  overflow:hidden;

  transition:
    opacity 2s ease-in-out,
    transform 2s ease-in-out,
    visibility 2s;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255,255,255,0.05);

  font-family:'Poppins','Segoe UI',sans-serif;
}

/* ALTIN IŞIK EFEKTİ */
#map-topbar::after{
  content:"";
  position:absolute;

  bottom:0;
  left:-25%;

  width:25%;
  height:2px;

  background:linear-gradient(
    90deg,
    rgba(255,184,0,0),
    rgba(255,184,0,0.25),
    rgba(255,210,80,1),
    rgba(255,184,0,0.25),
    rgba(255,184,0,0)
  );

  filter:blur(0.5px);

  box-shadow:
    0 0 8px rgba(255,184,0,0.9),
    0 0 16px rgba(255,184,0,0.6),
    0 0 22px rgba(255,210,80,0.35);

  animation:bottomLight 3.5s linear infinite;
}

@keyframes bottomLight{
  0%{
    left:-30%;
  }

  100%{
    left:105%;
  }
}

.topbar-title{
  font-size:24px; font-weight:700; color:#ffffff;
  text-align:center; padding:5px 0; background:rgba(255,255,255,0.04);
}

.topbar-subtitle{
  font-size:15px; font-weight:600; text-align:center; padding:4px 0;
  background:linear-gradient(135deg, #00c853, #00e676); /* Yeşil Başlık */
  color:#0b0b0b;
}

/* ===================================================== */
/*  UÇUŞ TANITIM YAZISI ÖZELLİKLERİ                      */
/* ===================================================== */
.flight-overlay-text {
    /* Konumlama - İstediğin %15 ve orta hizalama */
    position: absolute;
    bottom: 15%; 
    left: 50%;
    transform: translateX(-50%);
    
    /* Görsel Stil - Topbar'dan gelen doku */
    background: rgba(0, 0, 0, 0.88);
    border-radius: 2px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
    z-index: 99999;
    
    /* Yazı Özellikleri */
    color: #FFD700;
    font-size: 12px; /* Okunabilirlik için hafif optimize edildi */
    font-weight: 700;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    text-align: center;
    padding: 3px 3px;
    letter-spacing: 2px;
    white-space: nowrap; /* Yazının tek satır kalması için */
    
    border-left: 3px solid #ffb800;

    /* Animasyon Geçişi */
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
}

/* Yazı göründüğünde devreye girecek stil (JS ile opacity 1 olunca) */
.flight-overlay-text[style*="opacity: 1"] {
    transform: translateX(-50%) translateY(0);
}


</style>
</head>

<body>

<div id="map"></div>

<div id="flight-title" class="flight-overlay-text">Satılık Dükkan</div>

               src="images/video.mp4" muted playsinline>

">

    <!-- El İşareti -->
	<div id="clickIcon" style="
		font-size: 24px;

		text-shadow:
			0 0 5px rgba(0,0,0,0.9),
			0 0 10px rgba(0,0,0,0.8),
			0 0 18px rgba(255,215,0,0.9),

		filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
	">
		<i class="fa-solid fa-hand-point-down"></i>
	</div>

    <!-- Ses Butonu -->
<!-- Ses Butonu -->
	<div id="soundBtn" style="

		height: 40px;
		border-radius: 50%;
		background: rgba(0,0,0,0.65);
		color: white;
		display: flex;
		align-items: center;
		justify-content: center;

	</div>

</div>
<audio id="bgMusic" src="images/drone.mp3" preload="auto"></audio>


<!-- MAP ALT LOGO BAND -->
<div id="bottom-logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 300" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- Google Fonts üzerinden Great Vibes El Yazısı Fontu -->
      <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;display=swap');
      </style>
	
      <linearGradient id="premiumBg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1a1a1a"/>
        <stop offset="100%" stop-color="#0a0a0a"/>
      </linearGradient>
      
      <linearGradient id="brandOrange" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ff9800"/>
        <stop offset="100%" stop-color="#e65100"/>
      </linearGradient>

      <!-- NET Bölümü için Yumuşak Gölge Filtresi -->
      <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
      </filter>
    </defs>

    <!-- ANA ZEMİN (1340 Genişlik) -->
    <rect width="1340" height="300" rx="12" fill="url(#premiumBg)" stroke="#333" stroke-width="1"/>

    <!-- 🔥 LOGO ALANI (Sola Kaydırıldı) -->
    <g transform="translate(-20, 25)">
	
      <!-- 🏠 ÇATI ALANI ("en" dairesinin tam tepesine ortalandı) -->
      <g 
        stroke="url(#brandOrange)" 
        stroke-width="5" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        transform="translate(305, -5) scale(0.65)">
        <polyline points="0,30 55,5 110,30"/>
        <polyline points="25,30 55,16 85,30"/>
      </g>
	
      <!-- en dairesi ve yazısı -->
      <circle cx="202" cy="35" r="25" fill="none" stroke="#ff9800" stroke-width="2"/>
      <text x="200" y="45" text-anchor="middle" style="font-family: 'Great Vibes', 'Snell Roundhand', cursive;" font-size="50" fill="#ff9800">en</text>
      
      <!-- 🌟 YENİ NESİL ÖZEL "NET" ALANI (Lüks logodaki çizgili ve gölgeli tasarıma uyarlandı) -->
      <g filter="url(#softShadow)">
        <!-- N -->
        <text x="240" y="90" font-family="Arial Black, Impact" font-size="85" font-weight="900" fill="#ffffff">N</text>
        
        <!-- E (Üç Çizgili Hibrit Yapı) -->
        <g>
          <!-- ÜST ÇİZGİ BEYAZ -->
          <rect x="320" y="30" width="55" height="15" fill="#ffffff"/>
          <!-- ORTA ÇİZGİ TURUNCU/ALTIN -->
          <rect x="320" y="52" width="55" height="15" fill="url(#brandOrange)"/>
          <!-- ALT ÇİZGİ BEYAZ -->
          <rect x="320" y="75" width="55" height="15" fill="#ffffff"/>
        </g>

        <!-- T -->
        <text x="388" y="91" font-family="Arial Black, Impact" font-size="85" font-weight="900" fill="#ffffff">T</text>

function getAltitudeFromZoom(zoom) {
    return Math.max(30, Math.round(3000 / Math.pow(2, zoom - 10)));
}

function updateAltitude() {
    const zoom = map.getZoom();
    const altitude = getAltitudeFromZoom(zoom);

    const el = document.getElementById("altitudeInfo");
    if (el) {
        el.innerText = "Altitude: ~" + Math.round(altitude) + " m";
    }
}

    lastSpeedPosition = null;

    function getAltitudeFromZoom(zoom) {
        return Math.max(30, Math.round(3000 / Math.pow(2, zoom - 10)));
    }

    function getDistance(a, b) {
        const R = 6371000;
        const toRad = x => x * Math.PI / 180;
        const dLat = toRad(b[1] - a[1]);
        const dLng = toRad(b[0] - a[0]);
        const lat1 = toRad(a[1]);
        const lat2 = toRad(b[1]);
        const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
        return 2 * R * Math.asin(Math.sqrt(h));
    }

    function getBearing(a, b) {
        const dx = b[0] - a[0];
        const dy = b[1] - a[1];
        return (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
    }

    let totalDistance = 0;
    for (let i = 0; i < route.length - 1; i++) {
        totalDistance += getDistance(route[i], route[i + 1]);
    }

    const averageSpeedMS = Math.min(totalDistance / (totalDuration / 1000), 20);

    function animate(time) {
        if (!startTime) startTime = time;
        const elapsed = time - startTime;

        // 1️⃣ İLK 4 SANİYE: KALKIŞ VE YAZININ BELİRMESİ
        if (elapsed < WAIT_TIME) {
            const progress = Math.min(elapsed / WAIT_TIME, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            
            // Yazıyı havalanma ile birlikte göster
            if (titleElement) titleElement.style.opacity = progress;

            const acceleratingSpeed = averageSpeedMS * progress; 
            const currentZoom = map.getZoom();
            const targetAltitude = getAltitudeFromZoom(currentZoom);
            const currentClimbAlt = targetAltitude * ease;

            map.setPitch(targetPitch * ease);
            
            const startLng = route[0][0];
            const startLat = route[0][1];

            map.jumpTo({
                center: [startLng, startLat],
                pitch: targetPitch * ease
            });

            if (droneMarker) {
                droneMarker.setLngLat([startLng, startLat]);
                const startRotation = getBearing(route[0], route[1]);
                droneMarker.setRotation(startRotation);
                currentDroneRotation = startRotation;
            }

            timeElement.innerText = "Flight Time: " + Math.floor(elapsed / 1000) + " sn";
            speedElement.innerText = "GroundSpeed: " + acceleratingSpeed.toFixed(1) + " m/s";
            altitudeElement.innerText = "Altitude: ~" + Math.round(currentClimbAlt) + " m";

            requestAnimationFrame(animate);
            return;
        }

        // 2️⃣ ANA UÇUŞ HESAPLAMASI
        let t = (elapsed - WAIT_TIME) / (totalDuration - WAIT_TIME);
        t = Math.min(t, 1.30); 

        let targetDistance = t * totalDistance;

        // 🛑 FREN MEKANİZMASI
        if (t > 0.90) {
            const remainingDist = totalDistance - lastDistanceCovered;
            const maxStep = Math.max(0.02, remainingDist * 0.02); 
            if ((targetDistance - lastDistanceCovered) > maxStep) {
                targetDistance = lastDistanceCovered + maxStep;
            }
        }

        const distanceCovered = targetDistance;
        lastDistanceCovered = distanceCovered;

        // 3️⃣ PANEL GÜNCELLEMELERİ
        if (lastSpeedTime !== null && lastSpeedPosition && droneMarker) {
            const currentPos = droneMarker.getLngLat().toArray();
            const dt = (time - lastSpeedTime) / 1000;
            if (dt > 0) {
                const d = getDistance(lastSpeedPosition, currentPos);
                let speedMS = Math.min(d / dt, 20);
                speedElement.innerText = "GroundSpeed: " + speedMS.toFixed(1) + " m/s";
            }
        }
        if (droneMarker) lastSpeedPosition = droneMarker.getLngLat().toArray();
        lastSpeedTime = time;

        distanceElement.innerText = "Dist to Home: " + (distanceCovered / 1000).toFixed(2) + " km";
        timeElement.innerText = "Flight Time: " + Math.floor(elapsed / 1000) + " sn";

        // 4️⃣ ROTA TAKİBİ
        let traveled = 0;
        for (let i = 0; i < route.length - 1; i++) {
            const segment = getDistance(route[i], route[i + 1]);
            if (traveled + segment >= distanceCovered) {
                const progress = (distanceCovered - traveled) / segment;
                const lng = route[i][0] + (route[i + 1][0] - route[i][0]) * progress;
                const lat = route[i][1] + (route[i + 1][1] - route[i][1]) * progress;

                map.easeTo({ center: [lng, lat], pitch: targetPitch, duration: 0 });

                if (droneMarker) {
                    const currentMarkerPos = droneMarker.getLngLat();
                    const finalLng = currentMarkerPos.lng + (lng - currentMarkerPos.lng) * 0.15;
                    const finalLat = currentMarkerPos.lat + (lat - currentMarkerPos.lat) * 0.15;

                    const targetRotation = getBearing(route[i], route[i + 1]);
                    if (currentDroneRotation === null) currentDroneRotation = targetRotation;
                    let diff = (targetRotation - currentDroneRotation + 540) % 360 - 180;
                    currentDroneRotation += diff * 0.03;

                    droneMarker.setLngLat([finalLng, finalLat]).setRotation(currentDroneRotation);
                    
                    const currentMapBearing = map.getBearing();
                    let bDiff = (currentDroneRotation - currentMapBearing + 540) % 360 - 180;
                    const maxStepRot = 0.3; 
                    if (bDiff > maxStepRot) bDiff = maxStepRot;
                    if (bDiff < -maxStepRot) bDiff = -maxStepRot;
                    map.setBearing(currentMapBearing + bDiff);
                }
                break;
            }
            traveled += segment;
        }

        // 5️⃣ BİTİŞ KONTROLÜ
        if (totalDistance - distanceCovered > 0.1) {
            requestAnimationFrame(animate);
        } else {
            if (typeof startRotation === "function") startRotation();
        }
    }

    requestAnimationFrame(animate);
}


/* -------- 360° DÖNÜŞ -------- */
function startRotation() {
    const geoCenter = [34.008074, 38.369431];

    // Varsa önceki animasyonu durdur
    if (typeof rotation !== 'undefined') cancelAnimationFrame(rotation);

    // 1. Merkeze Odaklanma Başlat
    map.easeTo({
        center: geoCenter,
        zoom: 16,
        duration: 6000,
        pitch: 35
    });
    
    map.once("moveend", () => {
        // MARKER & PANEL FADE-OUT
        if (typeof markers !== "undefined") {
            markers.forEach(marker => {
                const el = marker.getElement();
                if (el) {
                    el.style.transition = "opacity 1500ms ease";
                    el.style.opacity = "0";
                }
                setTimeout(() => marker.remove(), 1500);
            });
            markers = [];
        }

        const panel = document.getElementById("flightPanel");
        if (panel) {
            panel.style.transition = "opacity 800ms ease, transform 800ms ease";
            panel.style.opacity = "0";
            panel.style.transform = "translateY(-20px)";
        }

        // DRONE SPIN AYARLARI
        let turned = 0;
        const step = 0.40; 
        let startTime = null;

        let droneStartRotation = 0;
        if (typeof droneMarker !== 'undefined' && droneMarker) {
            droneStartRotation = (typeof currentDroneRotation !== 'undefined') ? currentDroneRotation : map.getBearing();
        }

        function spin(timestamp) {
            if (!startTime) startTime = timestamp;

            if (turned >= 360) {
                if (typeof rotation !== 'undefined') cancelAnimationFrame(rotation); 
                finalizeRotation(); 
                return;
            }

            const newBearing = map.getBearing() + step;
            map.setBearing(newBearing);

            if (typeof droneMarker !== 'undefined' && droneMarker) {
                droneMarker.setRotation(droneStartRotation + turned);
            }

            turned += step;
            rotation = requestAnimationFrame(spin);
        }

        // KAPANIŞ VE VİDEO/CAROUSEL (GÜNCELLENMİŞ)
        function finalizeRotation() {
		// 1. Müzik ve Ses Butonu Yönetimi
		const music = document.getElementById("bgMusic");
		const btn = document.getElementById("soundBtn");
		const icon = document.getElementById("clickIcon");

		if (music) {
			if (!music.paused && music.volume > 0.01) {
				fadeOutMusic(music, 4000);
				if (typeof isPlaying !== 'undefined') isPlaying = false;
				if (btn) { btn.textContent = "🔇"; btn.style.transition = "opacity 4s"; btn.style.opacity = "0"; }
				if (icon) { icon.style.transition = "opacity 4s"; icon.style.opacity = "0"; }
			} else {
				music.pause();
				music.volume = 0;
			}
			setTimeout(() => { if (btn) btn.remove(); if (icon) icon.remove(); }, 4000);
		}

		console.log("🔄 360 derece dönüş tamamlandı, görseller başlıyor.");

		// 2. Harita temizlikleri
		if (map.getLayer('google-tiles-layer')) map.removeLayer('google-tiles-layer');
		if (map.getSource('google-tiles')) map.removeSource('google-tiles');
		const dukkanMarkers = document.querySelectorAll('.dukkan-marker');
		dukkanMarkers.forEach(m => m.remove());
		
		
		const topbar = document.getElementById("map-topbar");
			if (topbar) {
				topbar.style.display = "flex"; 
				
				// Tarayıcının yeni stili işlemesi için kısa bir raf gecikmesi
				requestAnimationFrame(() => {
					topbar.style.visibility = "visible";
					topbar.style.opacity = "1";
					// Başlangıçtaki -30px değerinden 0'a yumuşakça hareket edecek
					topbar.style.transform = "translateX(-50%) translateY(0)";
				});
			}
		// 3. Final Overlay ve Video
		const overlay = document.getElementById("finalOverlay");
		const video = document.getElementById("finalVideo");
				
		if (overlay) {
			overlay.style.backgroundColor = "white";
			overlay.style.display = "flex";
			
			if (video) {
				video.style.display = "block";
				video.style.opacity = "0"; 
				video.style.transition = "opacity 3000ms ease-in-out";
				
				requestAnimationFrame(() => {
					setTimeout(() => {
						video.style.opacity = "1";
					}, 200);
				});

				video.play().then(() => {
					video.onended = () => {
						video.style.opacity = "0";
						setTimeout(() => {
							video.style.display = "none";
							const carousel = document.getElementById("finalCarousel");
							if (carousel) {
								carousel.style.display = "block";
								startCarousel();
							}
						}, 3000);
					};
				}).catch(err => {
					console.warn("Video başlatılamadı:", err);
					video.style.display = "none";
					const carousel = document.getElementById("finalCarousel");
					if (carousel) { carousel.style.display = "block"; startCarousel(); }
				});
			}
		}
	}

        rotation = requestAnimationFrame(spin);
    });
}

// Carousel Başlatıcı
function startCarousel() {

    const images = [
        "images/1.jpeg",
        "images/2.jpeg",
        "images/3.jpeg",
        "images/4.jpeg",
        "images/5.jpeg",
        "images/6.jpeg"
    ];

    const imgEl = document.getElementById("carouselImg");
    const carouselContainer = document.getElementById("finalCarousel");
	const dotsContainer = document.getElementById("carouselDots");

    let i = 0;
	
	// DOTLARI OLUŞTUR
		const maxVisibleDots = 5;
		dotsContainer.innerHTML = "";

		// DOTLARI OLUŞTUR
		images.forEach(() => {

			const dot = document.createElement("div");

			dot.style.width = "7px";
			dot.style.height = "7px";
			dot.style.borderRadius = "50%";
			dot.style.background = "rgba(0,0,0,0.35)";
			dot.style.transition = "all 0.3s ease";
			dot.style.display = "none"; // başlangıçta gizli

			dotsContainer.appendChild(dot);
		});

		const dots = dotsContainer.children;


		// AKTİF + KAYDIRMALI DOT SİSTEMİ
		function updateDots() {

			let start = i - Math.floor(maxVisibleDots / 2);
			let end = start + maxVisibleDots;

			// soldan taşmayı düzelt
			if (start < 0) {
				start = 0;
				end = maxVisibleDots;
			}

			// sağdan taşmayı düzelt
			if (end > images.length) {
				end = images.length;
				start = end - maxVisibleDots;
				if (start < 0) start = 0;
			}

			for (let d = 0; d < dots.length; d++) {

				// görünür aralık
				if (d >= start && d < end) {

					dots[d].style.display = "inline-block";

					if (d === i) {

						dots[d].style.background = "#FFB800";
						dots[d].style.transform = "scale(1.15)";
						dots[d].style.boxShadow = "0 0 10px rgba(255,215,0,0.9)";

					} else {

						dots[d].style.background = "rgba(0,0,0,0.35)";
						dots[d].style.transform = "scale(1)";
						dots[d].style.boxShadow = "none";
					}

				} else {
					dots[d].style.display = "none";
				}
			}
		}

    // preload
    images.forEach(src => {
        const img = new Image();
        img.src = src;
    });

    imgEl.src = images[0];
    imgEl.style.opacity = 1;
	
	updateDots();

    function nextSlide() {

        i++;

        // Bittiğinde
        if (i >= images.length) {

            carouselContainer.style.transition = "opacity 1s ease";
            carouselContainer.style.opacity = "0";

            setTimeout(() => {

                carouselContainer.style.display = "none";

                const logo = document.getElementById("bottom-logo");

                if (logo) {
                    logo.style.opacity = "1";
                }

                renderSlogans();

            }, 1000);

            return;
        }

        // Önce fade out
        imgEl.style.opacity = 0;

        // Fade out bitince resmi değiştir
        setTimeout(() => {

            imgEl.src = images[i];

            // browser repaint zorla
            requestAnimationFrame(() => {
                imgEl.style.opacity = 1;
				updateDots();

            });

        }, 800);

        // Sonraki slide
        setTimeout(nextSlide, 4000);
    }

    // İlk geçişi başlat
    setTimeout(nextSlide, 4000);
}

/* ===============================
      SES SİSTEMİ KONTROLÜ
=============================== */

let fadeTimer = null;


// =========================
// FADE OUT
// =========================

function fadeOutMusic(audio) {

    if (fadeTimer) clearInterval(fadeTimer);

    const stepTime = 30;
    const fadeFactor = 0.93;

    fadeTimer = setInterval(() => {

        audio.volume *= fadeFactor;

        if (audio.volume <= 0.02) {

            audio.volume = 0;
            audio.pause();
            audio.currentTime = 0;

            clearInterval(fadeTimer);
            fadeTimer = null;
        }

    }, stepTime);
}

// ELEMENTLER
// =========================

const music = document.getElementById("bgMusic");
const btn = document.getElementById("soundBtn");
const icon = document.getElementById("clickIcon");

let isPlaying = false;

if (music) {
    music.volume = 1;
}


// =========================
// BUTON KONTROLÜ
// =========================

btn.addEventListener("click", async () => {

    // İkonu her tıklamada yeniden bul
    const soundIcon = document.getElementById("soundIcon");

    // =====================
    // MÜZİĞİ AÇ
    // =====================

    if (!isPlaying) {

        // El ikonunu gizle
        if (icon) {

            icon.style.opacity = "0";

            setTimeout(() => {
                icon.style.display = "none";
            }, 500);
        }

        // Çalışan fade varsa iptal et
        if (fadeTimer) {

            clearInterval(fadeTimer);
            fadeTimer = null;
        }

        music.volume = 1;

        try {

            await music.play();

            isPlaying = true;

            // SES AÇIK İKONU
            if (soundIcon) {
                soundIcon.className = "fa-solid fa-volume-high";
            }

        } catch (err) {

            console.error("Müzik çalınamadı:", err);
        }

    }

    // =====================
    // MÜZİĞİ KAPAT
    // =====================

    else {

        isPlaying = false;

        // SES KAPALI İKONU
        if (soundIcon) {
            soundIcon.className = "fa-solid fa-volume-xmark";
        }

        fadeOutMusic(music);

        // El ikonunu geri getir
        if (icon) {

            icon.style.display = "block";

            setTimeout(() => {
                icon.style.opacity = "1";
            }, 50);
        }
    }

});
